</div> <div id="combo-toast"> <div class="combo-main"> <span id="combo-text">Combo x1</span> </div> <div class="combo-hint" id="next-hint">再点 29 次解锁黑洞</div> </div> <div class="container" id="main-container"> <h1 id="main-title">趣味音乐盒</h1> <div class="button-grid"> <button class="sound-btn" data-text="我的刀盾" data-src="src/wodedaodun.mp3" onclick="handleClick(this, 'src/wodedaodun.mp3')"> 我的刀盾 </button> <button class="sound-btn" data-text="比比拉布" data-src="src/bibilabu.mp3" onclick="handleClick(this, 'src/bibilabu.mp3')"> 比比拉布 </button> <button class="sound-btn" data-text="巴巴博弈" data-src="src/bababoi.mp3" onclick="handleClick(this, 'src/bababoi.mp3')"> 巴巴博弈 </button> <button class="sound-btn" data-text="八嘎呀路" data-src="src/bagayalu.mp3" onclick="handleClick(this, 'src/bagayalu.mp3')"> 八嘎呀路 </button> </div> </div> <script> const CONFIG = { clickWindow: 1500, fadeOutDelay: 2000, gravityStrength: 2.5, friction: 0.92, minComboThreshold: 5, blackHoleThreshold: 30, lightningThreshold: 50, timeThreshold: 70, blackHoleMaxSize: 400, timeDuration: 8000, wanderDuration: 2500, blackHoleMoveSpeed: 0.5 }; let state = { lastBtn: null, count: 0, lastClickTime: 0, timer: null, isExploding: false, blackHoleActive: false, lightningActive: false, timeActive: false, elementsRemaining: 0, blackHoleSize: 80, blackHoleStrength: 1, blackHolePhase: 'grow', blackHolePos: { x: 0, y: 0 }, blackHoleVel: { x: 0, y: 0 } }; let currentAudio = null; let lastPlayedBtn = null; let currentSrc = ''; let activeParticles = []; let animationFrameId = null; let wanderTimer = null; let blackHoleElement = null; let accretionDisk = null; let gravityWell = document.getElementById('gravity-well'); let suckedElements = []; let ballLightning = null; let screenFlash = document.getElementById('screen-flash'); let timeWaves = []; const comboToast = document.getElementById('combo-toast'); const comboText = document.getElementById('combo-text'); const nextHint = document.getElementById('next-hint'); const mainContainer = document.getElementById('main-container'); function handleClick(btn, src) { if (state.isExploding || state.blackHoleActive || state.lightningActive || state.timeActive) return; const now = Date.now(); if (state.lastBtn === btn && (now - state.lastClickTime) < CONFIG.clickWindow) { state.count++; } else { if (state.lastBtn && state.lastBtn !== btn) { triggerFullSequence(state.lastBtn, state.count, currentSrc); } state.count = 1; } state.lastBtn = btn; state.lastClickTime = now; currentSrc = src; updateToastUI(state.count); if (state.timer) clearTimeout(state.timer); state.timer = setTimeout(() => { triggerFullSequence(btn, state.count, src); }, CONFIG.fadeOutDelay); playAudio(src, btn); } function updateToastUI(count) { comboToast.classList.add('visible'); comboText.textContent = `Combo x${count}`; let hint = ""; let themeClass = ""; if (count < CONFIG.blackHoleThreshold) { hint = `再点 ${CONFIG.blackHoleThreshold - count} 次解锁黑洞`; themeClass = ""; } else if (count < CONFIG.lightningThreshold) { hint = `再点 ${CONFIG.lightningThreshold - count} 次解锁闪电`; themeClass = "lightning-theme"; } else if (count < CONFIG.timeThreshold) { hint = `再点 ${CONFIG.timeThreshold - count} 次解锁时间冻结`; themeClass = "lightning-theme"; } else { hint = "终极形态已就绪!"; themeClass = "time-theme"; } nextHint.textContent = hint; comboToast.className = themeClass ? themeClass : ''; comboToast.classList.add('visible'); } function hideToast() { comboToast.classList.remove('visible'); } function triggerFullSequence(btn, count, src) { if (count < CONFIG.minComboThreshold) { hideToast(); resetGameState(btn); return; } if (count > CONFIG.timeThreshold) { triggerTimeMode(btn, count, src); return; } if (count > CONFIG.lightningThreshold) { triggerLightningMode(btn, count, src); return; } if (count > CONFIG.blackHoleThreshold) { triggerBlackHoleMode(btn, count, src); return; } state.isExploding = true; if (state.timer) clearTimeout(state.timer); if (wanderTimer) clearTimeout(wanderTimer); const btnRect = btn.getBoundingClientRect(); const centerX = btnRect.left + btnRect.width / 2; const centerY = btnRect.top + btnRect.height / 2; hideToast(); createScatteringParticles(centerX, centerY, count, btn, src, false); } function triggerBlackHoleMode(btn, count, src) { state.isExploding = true; state.blackHoleActive = true; state.blackHolePhase = 'grow'; state.blackHoleSize = 80; state.blackHoleStrength = 1; if (state.timer) clearTimeout(state.timer); const centerX = window.innerWidth / 2; const centerY = window.innerHeight / 2; state.blackHolePos = { x: centerX, y: centerY }; state.blackHoleVel = { x: (Math.random() - 0.5) * CONFIG.blackHoleMoveSpeed, y: (Math.random() - 0.5) * CONFIG.blackHoleMoveSpeed }; setTimeout(() => { hideToast(); createBlackHole(centerX, centerY, btn, src, count); }, 1000); } function createBlackHole(x, y, btn, src, count) { blackHoleElement = document.createElement('div'); blackHoleElement.classList.add('black-hole'); blackHoleElement.style.left = x + 'px'; blackHoleElement.style.top = y + 'px'; blackHoleElement.style.width = state.blackHoleSize + 'px'; blackHoleElement.style.height = state.blackHoleSize + 'px'; accretionDisk = document.createElement('div'); accretionDisk.classList.add('accretion-disk'); blackHoleElement.appendChild(accretionDisk); document.body.appendChild(blackHoleElement); gravityWell.style.background = `radial-gradient(circle at ${x}px ${y}px, transparent 0%, transparent 20%, rgba(0,0,0,0.6) 70%, rgba(0,0,0,0.9) 100%)`; gravityWell.style.opacity = '1'; startContinuousGravityLoop(x, y); } function startContinuousGravityLoop(centerX, centerY) { function animate() { if (!state.blackHoleActive) return; if (state.blackHolePhase === 'grow') { state.blackHolePos.x += state.blackHoleVel.x; state.blackHolePos.y += state.blackHoleVel.y; if (state.blackHolePos.x < 100 || state.blackHolePos.x > window.innerWidth - 100) { state.blackHoleVel.x *= -1; } if (state.blackHolePos.y < 100 || state.blackHolePos.y > window.innerHeight - 100) { state.blackHoleVe x = suckedElements.indexOf(el); if (idx > -1) suckedElements.splice(idx, 1); } function createTextParticle(char, x, y, targetX, targetY) { const p = document.createElement('div'); p.classList.add('text-particle'); p.textContent = char; p.style.left = x + 'px'; p.style.top = y + 'px'; document.body.appendChild(p); let life = 100; function animateParticle() { if (life <= 0 || !state.blackHoleActive) { p.remove(); return; } const cx = targetX; const cy = targetY; const px = parseFloat(p.style.left); const py = parseFloat(p.style.top); const dist = Math.hypot(cx - px, cy - py); if (dist < 20) { p.style.opacity = 0; setTimeout(() => p.remove(), 200); return; } const curAngle = Math.atan2(cy - py, cx - px); const spiral = curAngle + (Date.now() / 500); const force = 2 * state.blackHoleStrength; const vx = Math.cos(spiral) * force; const vy = Math.sin(spiral) * force; p.style.left = (px + vx) + 'px'; p.style.top = (py + vy) + 'px'; p.style.transform = `rotate(${Date.now()/10}deg)`; life--; requestAnimationFrame(animateParticle); } requestAnimationFrame(animateParticle); } function triggerLightningMode(btn, count, src) { state.isExploding = true; state.lightningActive = true; if (state.timer) clearTimeout(state.timer); const centerX = window.innerWidth / 2; const centerY = window.innerHeight / 2; setTimeout(() => { hideToast(); spawnBallLightning(centerX, centerY, btn, src, count); }, 1000); } function spawnBallLightning(x, y, btn, src, count) { ballLightning = document.createElement('div'); ballLightning.classList.add('ball-lightning'); ballLightning.style.width = '60px'; ballLightning.style.height = '60px'; ballLightning.style.left = x + 'px'; ballLightning.style.top = y + 'px'; ballLightning.style.opacity = '1'; document.body.appendChild(ballLightning); let lx = x; let ly = y; let lvx = (Math.random() - 0.5) * 15; let lvy = (Math.random() - 0.5) * 15; function moveLightning() { if (!state.lightningActive) { if (ballLightning) { ballLightning.style.opacity = '0'; setTimeout(() => ballLightning.remove(), 500); ballLightning = null; } return; } lx += lvx; ly += lvy; if (lx < 50 || lx > window.innerWidth - 50) lvx *= -1; if (ly < 50 || ly > window.innerHeight - 50) lvy *= -1; lx += (Math.random() - 0.5) * 10; ly += (Math.random() - 0.5) * 10; ballLightning.style.left = lx + 'px'; ballLightning.style.top = ly + 'px'; const buttons = document.querySelectorAll('.sound-btn'); const title = document.getElementById('main-title'); const targets = [...buttons, title].filter(el => el && el.offsetParent !== null); state.elementsRemaining = targets.length; if (state.elementsRemaining === 0) { if (ballLightning) { ballLightning.style.opacity = '0'; setTimeout(() => { if (ballLightning) ballLightning.remove(); ballLightning = null; }, 500); } setTimeout(cleanupDestruction, 1000); return; } let hit = false; for (let i = 0; i < targets.length; i++) { const t = targets[i]; if (!t) continue; const rect = t.getBoundingClientRect(); const dist = Math.hypot(lx - (rect.left + rect.width/2), ly - (rect.top + rect.height/2)); if (dist < 120 && Math.random() < 0.1) { destroyElement(t); hit = true; break; } } requestAnimationFrame(moveLightning); } moveLightning(); } function triggerTimeMode(btn, count, src) { state.isExploding = true; state.timeActive = true; if (state.timer) clearTimeout(state.timer); document.body.classList.add('time-frozen'); const centerX = window.innerWidth / 2; const centerY = window.innerHeight / 2; setTimeout(() => { hideToast(); startTimeFreezeEffect(centerX, centerY, btn, src, count); }, 1000); setTimeout(() => { if (state.timeActive) cleanupDestruction(); }, CONFIG.timeDuration); } function startTimeFreezeEffect(x, y, btn, src, count) { createTimeWave(x, y); document.addEventListener('click', createTimeWaveHandler); function createTimeWaveHandler(e) { if (!state.timeActive) { document.removeEventListener('click', createTimeWaveHandler); return; } createTimeWave(e.clientX, e.clientY); checkWaveCollision(e.clientX, e.clientY); } function checkWaveCollision(wx, wy) { const buttons = document.querySelectorAll('.sound-btn'); const title = document.getElementById('main-title'); const targets = [...buttons, title].filter(el => el && el.offsetParent !== null); targets.forEach(t => { const rect = t.getBoundingClientRect(); const tx = rect.left + rect.width/2; const ty = rect.top + rect.height/2; const dist = Math.hypot(wx - tx, wy - ty); if (dist < 150) { pushElementAway(t, wx, wy); if (dist < 50) { destroyElement(t); } } }); state.elementsRemaining = document.querySelectorAll('.sound-btn:not([style*="opacity: 0"])').length + (title.style.opacity !== '0' ? 1 : 0); if (state.elementsRemaining === 0) { setTimeout(cleanupDestruction, 1000); } } } function pushElementAway(el, sourceX, sourceY) { const rect = el.getBoundingClientRect(); const cx = rect.left + rect.width/2; const cy = rect.top + rect.height/2; const dx = cx - sourceX; const dy = cy - sourceY; const dist = Math.sqrt(dx*dx + dy*dy); if (dist === 0) return; const force = 5000 / (dist + 10); const vx = (dx / dist) * force; const vy = (dy / dist) * force; el.style.position = 'fixed'; el.style.left = (cx + vx) + 'px'; el.style.top = (cy + vy) + 'px'; el.style.transform = `scale(0.9) rotate(${vx}deg)`; } function createTimeWave(x, y) { const wave = document.createElement('div'); wave.classList.add('time-wave'); wave.style.left = x + 'px'; wave.style.top = y + 'px'; wave.style.width = '10px'; wave.style.height = '10px'; document.body.appendChild(wave); timeWaves.push(wave); let scale = 0; function expand() { if (!state.timeActive) { wave.remove(); return; } scale += 0.05; wave.style.transform = `translate(-50%, -50%) scale(${scale})`; wave.style.opacity = 1 - (scale / 20); if (scale < 20) { requestAnimationFrame(expand); } else { wave.remove(); } } requestAnimationFrame(expand); } function destroyElement(el) { if (!el.parentNode || el.style.opacity === '0') return; const text = el.dataset.text || el.innerText; const src = el.dataset.src; if (src) playAudioOnce(src); explodeElement(el, text); if (el.id === 'main-title') { el.style.opacity = '0'; } else { el.remove(); } const idx = suckedElements.indexOf(el); if (idx > -1) suckedElements.splice(idx, 1); } function triggerScreenFlash() { screenFlash.style.opacity = '0.8'; screenFlash.style.transition = 'none'; document.body.style.filter = 'invert(1)'; setTimeout(() => { screenFlash.style.transition = 'opacity 0.1s'; screenFlash.style.opacity = '0'; document.body.style.filter = 'none'; }, 50); } function createLightningBolt(x1, y1, x2, y2) { const bolt = document.createElement('div'); bolt.classList.add('lightning-bolt'); const length = Math.hypot(x2-x1, y2-y1); const angle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI; bolt.style.height = length + 'px'; bolt.style.left = x1 + 'px'; bolt.style.top = y1 + 'px'; bolt.style.transform = `rotate(${angle + 90}deg)`; bolt.style.opacity = '1'; document.body.appendChild(bolt); setTimeout(() => { bolt.style.transition = 'opacity 0.05s'; bolt.style.opacity = '0'; setTimeout(() => bolt.remove(), 50); }, 80); } function explodeElement(el, text) { const rect = el.getBoundingClientRect(); const centerX = rect.left + rect.width / 2; const centerY = rect.top + rect.height / 2; if (state.lightningActive) { triggerScreenFlash(); createLightningBolt(centerX, centerY, centerX, centerY - 100); } el.style.opacity = '0'; el.style.pointerEvents = 'none'; const shardCount = 20; for (let i = 0; i < shardCount; i++) { const shard = document.createElement('div'); shard.classList.add('text-shard'); shard.textContent = text.substring(0, 2) || '#'; shard.style.left = centerX + 'px'; shard.style.top = centerY + 'px'; shard.style.fontSize = (10 + Math.random() * 15) + 'px'; shard.style.color = state.timeActive ? '#00d2d3' : '#00ffff'; document.body.appendChild(shard); const angle = Math.random() * Math.PI * 2; const speed = (state.timeActive ? 0.5 : 1) * (5 + Math.random() * 15); shard.style.transition = `transform ${0.5 + Math.random()}s cubic-bezier(0, .9, .57, 1), opacity 0.5s`; void shard.offsetWidth; const translateX = Math.cos(angle) * speed * 20; const translateY = Math.sin(angle) * speed * 20; const rotate = (Math.random() - 0.5) * 720; shard.style.transform = `translate(${translateX}px, ${translateY}px) rotate(${rotate}deg)`; shard.style.opacity = '0'; setTimeout(() => shard.remove(), 1000); } } function cleanupDestruction() { state.blackHoleActive = false; state.lightningActive = false; state.timeActive = false; suckedElements = []; timeWaves = []; document.body.classList.remove('time-frozen'); document.removeEventListener('click', createTimeWaveHandler); gravityWell.style.opacity = '0'; const buttons = document.querySelectorAll('.sound-btn'); buttons.forEach(btn => { btn.style = ''; btn.style.opacity = '1'; btn.style.transform = 'scale(1)'; }); const title = document.getElementById('main-title'); if (title) { title.style = ''; title.style.opacity = '0.6'; title.style.visibility = 'visible'; } setTimeout(() => { resetGameState(null); }, 1000); } function createScatteringParticles(x, y, count, btn, src, isWhiteHoleMode) { const particleCount = Math.min(count * 3, 80); activeParticles = []; const screenW = window.innerWidth; const screenH = window.innerHeight; for (let i = 0; i < particleCount; i++) { const p = document.createElement('div'); p.classList.add('flight-particle'); p.textContent = `Combo!`; document.body.appendChild(p); let startX, startY; if (isWhiteHoleMode) { startX = x; startY = y; } else { startX = Math.random() * screenW; startY = Math.random() * (screenH * 0.3); } p.style.left = startX + 'px'; p.style.top = startY + 'px'; const angle = Math.random() * Math.PI * 2; const speed = 12 + Math.random() * 8; let vx = Math.cos(angle) * speed; let vy = Math.sin(angle) * speed; if (isWhiteHoleMode) { vx *= 3; vy *= 3; } activeParticles.push({ element: p, x: startX, y: startY, vx: vx, vy: vy, targetBtn: btn, mode: isWhiteHoleMode ? 'scatter' : 'wander' }); } if (!isWhiteHoleMode) { startPhysicsLoop(btn, src); wanderTimer = setTimeout(() => switchToAttackMode(), CONFIG.wanderDuration); } else { activeParticles.forEach(p => { p.element.style.transition = 'top 1s, opacity 1s'; p.element.style.top = (window.innerHeight + 50) + 'px'; p.element.style.opacity = '0'; setTimeout(() => p.element.remove(), 1000); }); resetGameState(btn); } } function switchToAttackMode() { activeParticles.forEach(p => { if (!p.hasHitButton) p.mode = 'attack'; }); } function startPhysicsLoop(btn, src) { let btnRect = btn.getBoundingClientRect(); const screenW = window.innerWidth; const screenH = window.innerHeight; let particlesHit = 0; const totalParticles = activeParticles.length; let audioPlayedCount = 0; function loop() { if (activeParticles.length === 0) { finalizeExplosion(btn, src); return; } btnRect = btn.getBoundingClientRect(); const curTargetX = btnRect.left + btnRect.width / 2; const curTargetY = btnRect.top + btnRect.height / 2; let activeCount = 0; activeParticles.forEach((p) => { if (p.hasHitButton) { p.element.remove(); return; } if (p.mode === 'attack') { const dx = curTargetX - p.x; const dy = curTargetY - p.y; const dist = Math.sqrt(dx*dx + dy*dy); if (dist > 1) { const force = CONFIG.gravityStrength * (1 + (500/(dist+1))); p.vx += (dx / dist) * force; p.vy += (dy / dist) * force; } } p.vx *= CONFIG.friction; p.vy *= CONFIG.friction; p.x += p.vx; p.y += p.vy; const pWidth = 40; const pHeight = 20; if (p.x <= 0) { p.x = 0; p.vx *= -0.9; } if (p.x >= screenW - pWidth) { p.x = screenW - pWidth; p.vx *= -0.9; } if (p.y <= 0) { p.y = 0; p.vy *= -0.9; } if (p.y >= screenH - pHeight) { p.y = screenH - pHeight; p.vy *= -0.9; } p.element.style.left = p.x + 'px'; p.element.style.top = p.y + 'px'; if (p.mode === 'attack' && p.x > btnRect.left && p.x < btnRect.right && p.y > btnRect.top && p.y < btnRect.bottom) { p.hasHitButton = true; particlesHit++; if (audioPlayedCount < state.count) { playAudioOnce(src); audioPlayedCount++; } p.element.style.transition = 'transform 0.1s, opacity 0.1s'; p.element.style.transform = 'scale(0) skew(-15deg)'; p.element.style.opacity = '0'; setTimeout(() => p.element.remove(), 100); btn.style.transform = 'scale(0.95)'; setTimeout(() => btn.style.transform = 'scale(1)', 100); } else { activeCount++; } }); if (activeCount > 0) { animationFrameId = requestAnimationFrame(loop); } else { setTimeout(() => finalizeExplosion(btn, src), 300); } } loop(); } function playAudioOnce(src) { const audio = new Audio(src); audio.volume = 0.6; if (state.timeActive) audio.playbackRate = 0.5; audio.play().catch(()=>{}); } function finalizeExplosion(btn, src) { if (!btn) return; const text = btn.dataset.text; const btnRect = btn.getBoundingClientRect(); const centerX = btnRect.left + btnRect.width / 2; const centerY = btnRect.top + btnRect.height / 2; btn.style.transition = 'all 0.1s'; btn.style.transform = 'scale(1.2)'; btn.style.opacity = '0'; btn.style.filter = 'brightness(5)'; const shardCount = 20; for (let i = 0; i < shardCount; i++) { const shard = document.createElement('div'); shard.classList.add('text-shard'); shard.textContent = text; shard.style.left = centerX + 'px'; shard.style.top = centerY + 'px'; shard.style.fontSize = (15 + Math.random() * 20) + 'px'; document.body.appendChild(shard); const angle = Math.random() * Math.PI * 2; const speed = 5 + Math.random() * 15; shard.style.transition = `transform ${0.5 + Math.random()}s cubic-bezier(0, .9, .57, 1), opacity 0.5s`; void shard.offsetWidth; const translateX = Math.cos(angle) * speed * 20; const translateY = Math.sin(angle) * speed * 20; const rotate = (Math.random() - 0.5) * 720; shard.style.transform = `translate(${translateX}px, ${translateY}px) rotate(${rotate}deg)`; shard.style.opacity = '0'; setTimeout(() => shard.remove(), 1000); } setTimeout(() => { resetGameState(btn); }, 1200); } function resetGameState(btn) { state.isExploding = false; state.count = 0; state.lastBtn = null; state.elementsRemaining = 0; activeParticles = []; if (animationFrameId) cancelAnimationFrame(animationFrameId); if (wanderTimer) clearTimeout(wanderTimer); const buttons = document.querySelectorAll('.sound-btn'); buttons.forEach(b => { b.style = ''; b.style.opacity = '1'; b.style.transform = 'scale(1)'; }); const title = document.getElementById('main-title'); if (title) { title.style = ''; title.style.opacity = '0.6'; } mainContainer.style.transform = ''; gravityWell.style.opacity = '0'; hideToast(); document.querySelectorAll('.text-shard, .text-particle, .time-wave, .flight-particle').forEach(el => el.remove()); } function playAudio(src, btn) { if (state.isExploding || state.blackHoleActive || state.lightningActive || state.timeActive) return; if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; if (lastPlayedBtn) lastPlayedBtn.classList.remove('playing'); } currentAudio = new Audio(src); lastPlayedBtn = btn; currentAudio.onplay = () => btn.classList.add('playing'); currentAudio.onended = () => btn.classList.remove('playing'); currentAudio.play().catch(e=>{}); } window.addEventListener('resize', () => { if (state.lastBtn && !state.isExploding && !state.blackHoleActive && !state.lightningActive && !state.timeActive) { updateToastUI(state.count); } }); </script> </body> </html>
